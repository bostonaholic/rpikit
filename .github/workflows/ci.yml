name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Resolve npm global prefix
        id: npm-prefix
        run: echo "path=$(npm prefix -g)" >> "$GITHUB_OUTPUT"

      - name: Cache Claude CLI
        id: cache-claude
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-prefix.outputs.path }}
          key: claude-cli-${{ runner.os }}-node${{ runner.arch }}-${{ hashFiles('.claude-code-version') }}

      - name: Install Claude Code CLI
        if: steps.cache-claude.outputs.cache-hit != 'true'
        run: npm install -g @anthropic-ai/claude-code@$(cat .claude-code-version)

      - name: Cache yq
        id: cache-yq
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/yq
          key: yq-${{ runner.os }}-${{ runner.arch }}-4.52.4

      - name: Install yq
        if: steps.cache-yq.outputs.cache-hit != 'true'
        run: |
          sudo curl -sSL \
            https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64 \
            -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Run test suite
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh

      - name: Validate plugin
        run: claude plugin validate .

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !.beads/**/*.md

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache shellcheck
        id: cache-shellcheck
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/shellcheck
          key: shellcheck-${{ runner.os }}-${{ runner.arch }}-0.11.0

      - name: Install shellcheck
        if: steps.cache-shellcheck.outputs.cache-hit != 'true'
        run: |
          curl -sSL \
            https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz \
            | sudo tar -xJ --strip-components=1 -C /usr/local/bin shellcheck-v0.11.0/shellcheck
          sudo chmod +x /usr/local/bin/shellcheck

      - name: Run shellcheck
        run: shellcheck tests/*.sh bin/start

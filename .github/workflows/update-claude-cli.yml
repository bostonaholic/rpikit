name: Update Claude CLI Version

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday at 9am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Check for Claude CLI update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check for newer version
        id: check
        run: |
          current=$(cat .claude-code-version | tr -d '[:space:]')
          latest=$(npm show @anthropic-ai/claude-code version)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version file
        if: steps.check.outputs.updated == 'true'
        env:
          LATEST_VERSION: ${{ steps.check.outputs.latest }}
        run: echo "$LATEST_VERSION" > .claude-code-version

      - name: Create pull request
        if: steps.check.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(deps): update Claude CLI from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}'
          title: 'chore(deps): update Claude CLI to ${{ steps.check.outputs.latest }}'
          body: |
            Updates `@anthropic-ai/claude-code` from `${{ steps.check.outputs.current }}` to `${{ steps.check.outputs.latest }}`.

            This PR was auto-generated by the `update-claude-cli` workflow.
          branch: update-claude-cli
          delete-branch: true
